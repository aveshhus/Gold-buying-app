# ============================================
# Nginx Configuration - Temporary Domain (HTTP Only)
# ============================================
# 
# Use this for testing with temporary domain (no SSL needed)
#   - Frontend: http://srv1226397.hstgr.cloud
#   - Backend API: http://srv1226397.hstgr.cloud/api
#
# Installation:
#   1. Copy this file to: /etc/nginx/sites-available/goldapp
#   2. Edit and replace 'srv1226397.hstgr.cloud' with your temporary domain
#   3. Create symlink: ln -s /etc/nginx/sites-available/goldapp /etc/nginx/sites-enabled/
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx
#
# ============================================

server {
    listen 80;
    server_name srv1226397.hstgr.cloud;
    # Replace above with your actual temporary domain

    # Logging
    access_log /var/log/nginx/goldapp-access.log;
    error_log /var/log/nginx/goldapp-error.log;

    # Client body size limit (for file uploads)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Backend API - Must come BEFORE frontend location
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend (Next.js) - Catch-all for everything else
    location / {
        proxy_pass http://localhost:3003;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://localhost:3003;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }
}

